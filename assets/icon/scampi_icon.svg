  <!-- BACKGROUND                                          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#glowOrange)"/>

