  <!-- TAIL FAN  (5 leaf-blades, centre ≈ 248,658)        -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Dark outline layer (slightly larger) -->
  <g fill="#9A3412">
    <path d="M248,658 Q259,692 234,752 Q222,688 248,658 Z"/>
    <path d="M248,658 Q242,696 196,740 Q216,676 248,658 Z"/>
    <path d="M248,658 Q226,692 166,716 Q209,665 248,658 Z"/>
    <path d="M248,658 Q216,681 153,681 Q213,647 248,658 Z"/>
    <path d="M248,658 Q212,669 152,641 Q217,633 248,658 Z"/>
  </g>

  <!-- Colour layer -->
  <g fill="url(#fanGrad)">
    <path d="M248,656 Q257,688 232,748 Q220,684 248,656 Z"/>
    <path d="M248,656 Q240,692 194,736 Q214,672 248,656 Z"/>
    <path d="M248,656 Q225,690 165,712 Q207,663 248,656 Z"/>
    <path d="M248,656 Q215,677 152,677 Q211,643 248,656 Z"/>
    <path d="M248,656 Q210,665 151,638 Q215,630 248,656 Z"/>
  </g>

