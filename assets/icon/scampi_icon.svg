    C525,397 602,343 697,307
    C749,285 805,275 822,286
    C820,304 799,336 761,364
    C729,385 705,405 677,429
    C659,443 638,458 616,466
    C593,474 557,468 538,464
    C515,455 500,454 495,452
    Z
  " fill="url(#bodyGrad)"/>

  <!-- Dorsal shine stripe -->
  <path d="
    M541,382
    C571,350 636,318 711,300
    C755,290 801,284 821,286
    C815,298 797,314 767,325
    C737,336 705,342 673,347
    C645,351 611,354 583,358
    C564,361 546,368 541,382
    Z
  " fill="white" fill-opacity="0.11"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ROSTRUM  (forward-pointing spike)                   -->
  <!-- ═══════════════════════════════════════════════════ -->
  <path d="M751,358 C776,332 801,304 829,287 C821,283 811,283 801,286 C779,302 757,326 743,350 Z" fill="#9A3412"/>
  <path d="M749,352 C774,326 799,298 827,282 C819,278 809,278 799,281 C776,297 754,322 741,346 Z" fill="#FB923C"/>
  <path d="M749,347 C766,330 787,307 808,292 C800,280 790,279 782,281 C764,294 748,316 741,336 Z" fill="white" fill-opacity="0.16"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- EYE                                                 -->
  <!-- ═══════════════════════════════════════════════════ -->
  <line x1="725" y1="390" x2="723" y2="370" stroke="#C2410C" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="719" cy="364" r="16" fill="#1A0500"/>
  <circle cx="719" cy="364" r="12" fill="white"/>
  <circle cx="721" cy="362" r="7"  fill="#050B18"/>
  <circle cx="724" cy="359" r="3"  fill="white" fill-opacity="0.9"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LOWER CLAW                                          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Arm shadow -->
  <path d="M677,452 C707,443 741,432 773,421 C779,419 785,420 785,426 C784,432 779,436 771,440 C738,451 704,462 674,472 C673,473 669,470 668,463 Z" fill="#9A3412"/>
  <!-- Arm colour -->
  <path d="M678,447 C708,437 742,426 773,416 C779,413 785,414 784,420 C783,426 778,430 770,434 C737,445 703,457 673,467 C672,468 669,465 668,458 Z" fill="#EA580C"/>
  <!-- Fixed finger -->
  <path d="M773,416 C787,408 803,404 811,410 C813,415 807,424 794,428 C783,432 769,431 768,425 Z" fill="#F97316"/>
  <!-- Mobile finger -->
  <path d="M773,416 C785,422 798,431 801,438 C802,443 795,446 785,440 C775,434 767,424 765,417 Z" fill="#C2410C"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- UPPER CLAW                                          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Arm shadow -->
  <path d="M685,424 C715,404 753,382 789,363 C795,360 801,361 802,366 C801,372 795,377 787,381 C752,399 714,421 683,441 C682,442 678,440 677,432 Z" fill="#9A3412"/>
  <!-- Arm colour -->
  <path d="M686,418 C716,398 754,376 789,357 C795,354 801,355 802,360 C801,366 795,370 786,374 C751,392 713,415 682,435 C681,436 677,434 676,426 Z" fill="#F97316"/>
  <!-- Fixed finger -->
  <path d="M789,357 C808,343 826,334 832,340 C835,346 827,358 814,364 C802,370 787,372 785,366 Z" fill="#FB923C"/>
  <!-- Mobile finger -->
  <path d="M789,357 C803,361 818,372 822,379 C824,385 816,389 806,382 C795,375 785,364 783,357 Z" fill="#EA580C"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ANTENNAE  (brand emerald-green)                     -->
  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Two long main antennae -->
  <g stroke="#34D399" stroke-width="5.5" fill="none" stroke-linecap="round">
    <path d="M763,360 C791,330 837,285 879,248 C913,218 947,198 971,190"/>
    <path d="M757,372 C785,354 826,330 865,308 C897,290 929,280 955,278"/>
  </g>
  <!-- Two short antennules (thinner, lighter) -->
  <g stroke="#6EE7B7" stroke-width="3.5" fill="none" stroke-linecap="round">
    <path d="M756,368 C763,352 775,336 785,325"/>
    <path d="M759,374 C769,360 783,348 795,340"/>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- OVERALL DORSAL SHINE                               -->
  <!-- ═══════════════════════════════════════════════════ -->
  <path d="
    M315,582
    C384,538 463,492 539,452
    C598,420 658,398 714,376
    C740,367 765,357 783,350
    C776,342 765,338 755,340
    C738,346 716,354 694,362
    C638,384 578,406 518,438
    C442,477 362,525 293,566
    C288,570 282,580 288,590
    Z
  " fill="white" fill-opacity="0.09"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- BRAND-GREEN ACCENT DOTS on dorsal carapace ridge    -->
  <!-- ═══════════════════════════════════════════════════ -->
  <circle cx="602" cy="370" r="5"  fill="#34D399" fill-opacity="0.45"/>
  <circle cx="652" cy="352" r="4"  fill="#34D399" fill-opacity="0.35"/>
  <circle cx="700" cy="338" r="3.5" fill="#34D399" fill-opacity="0.28"/>
</svg>
