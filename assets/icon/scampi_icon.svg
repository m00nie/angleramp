    <ellipse cx="186" cy="720" rx="13" ry="6" transform="rotate(-10 186 720)"/>
    <ellipse cx="167" cy="696" rx="12" ry="5" transform="rotate(-30 167 696)"/>
    <ellipse cx="164" cy="668" rx="11" ry="5" transform="rotate(-55 164 668)"/>
    <ellipse cx="169" cy="643" rx="11" ry="5" transform="rotate(-75 169 643)"/>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- WALKING LEGS  (5 pairs, small curves under abdomen) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g stroke="#C2410C" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M558,493 C551,516 540,540 532,558"/>
    <path d="M572,486 C578,509 580,535 574,554"/>
    <path d="M494,533 C486,556 475,580 467,598"/>
    <path d="M509,526 C516,549 517,574 511,593"/>
    <path d="M430,567 C422,590 411,613 403,631"/>
    <path d="M446,560 C453,583 454,608 447,627"/>
    <path d="M366,599 C358,622 347,645 340,662"/>
    <path d="M382,593 C390,615 390,639 383,658"/>
    <path d="M306,630 C297,650 287,673 281,689"/>
    <path d="M323,622 C331,644 330,667 323,686"/>
  </g>

