  <path d="
    M266,678
    C299,668 332,648 358,634
    C403,608 453,572 485,547
    C503,533 518,519 529,505
    C541,489 552,479 556,471
    C528,465 507,450 495,434
    C479,446 457,465 442,483
    C425,501 404,520 377,538
    C347,558 299,589 266,611
    C258,617 244,633 241,653
    Z
  " fill="url(#bodyGrad)"/>

  <!-- Segment divider lines -->
  <g stroke="#9A3412" stroke-width="3.5" fill="none" stroke-linecap="round">
    <line x1="321" y1="624" x2="363" y2="658"/>
    <line x1="381" y1="572" x2="423" y2="606"/>
    <line x1="440" y1="520" x2="482" y2="554"/>
    <line x1="485" y1="485" x2="519" y2="511"/>
    <line x1="516" y1="460" x2="547" y2="480"/>
  </g>

