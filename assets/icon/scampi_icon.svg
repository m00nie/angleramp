<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background: deep navy, lighter at centre -->
    <radialGradient id="bgGrad" cx="48%" cy="46%" r="58%">
      <stop offset="0%" stop-color="#0F182E"/>
      <stop offset="100%" stop-color="#030812"/>
    </radialGradient>
    <!-- Warm orange glow around the langoustine -->
    <radialGradient id="glowOrange" cx="54%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <!-- Main body gradient: dark orange (tail) → vivid orange → light orange (rostrum) -->
    <linearGradient id="bodyGrad" x1="240" y1="690" x2="730" y2="315" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C2410C"/>
      <stop offset="42%"  stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <!-- Fan gradient: slightly less vivid -->
    <linearGradient id="fanGrad" x1="280" y1="630" x2="155" y2="725" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#9A3412"/>
    </linearGradient>
  </defs>

