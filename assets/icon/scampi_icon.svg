    C301,674 335,654 361,640
    C407,614 457,578 488,553
    C506,539 522,524 533,510
    C546,494 558,483 561,476
    C533,470 511,456 499,440
    C483,452 461,470 446,488
    C429,506 408,525 381,543
    C351,563 303,594 270,616
    C261,622 247,637 244,660
    Z
  " fill="#7C2D12"/>

