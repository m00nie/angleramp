    C526,404 603,350 699,314
    C751,292 807,282 825,292
    C823,312 801,344 763,372
    C731,393 707,413 679,437
    C662,450 641,464 619,472
    C597,480 560,474 541,470
    C518,462 503,460 496,458
    Z
  " fill="#7C2D12"/>

